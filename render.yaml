services:
  - type: web
    name: docassist-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DB_PATH
        value: /data/docassist.db
      - key: PYTHON_VERSION
        value: 3.10.0
    disk:
      name: docassist-data
      mountPath: /data
      sizeGB: 1
